<?xml version="1.0" encoding="utf-8"?>
<!-- assets/header.svg — Light version with 20 cats -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-label="Anime-style businessman playing with many cats (light)">
  <defs>
    <!-- light palette -->
    <linearGradient id="bgLight" x1="0" x2="1">
      <stop offset="0" stop-color="#f6fbff"/>
      <stop offset="1" stop-color="#e6f2ff"/>
    </linearGradient>

    <linearGradient id="skinSh" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffdcb2"/>
      <stop offset="1" stop-color="#f2c99a"/>
    </linearGradient>
    <linearGradient id="suitSh" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#1b4f82"/>
      <stop offset="1" stop-color="#0f3a62"/>
    </linearGradient>

    <!-- sparkle -->
    <g id="spark"><path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="#ffe98a"/></g>

    <!-- chibi cat (single definition) -->
    <g id="cat-chibi">
      <ellipse rx="18" ry="16" cx="0" cy="0" fill="#fff1cc" stroke="#d28a4e" stroke-width="1.4"/>
      <path d="M-12,-6 L-6,-22 L-2,-6 Z" fill="#fff1cc" stroke="#d28a4e" stroke-width="1"/>
      <path d="M12,-6 L6,-22 L2,-6 Z" fill="#fff1cc" stroke="#d28a4e" stroke-width="1"/>
      <g transform="translate(-5,-2)"><ellipse rx="4.6" ry="7.4" fill="#1b2430"/><circle cx="-1.2" cy="-1.8" r="1.2" fill="#fff"/></g>
      <g transform="translate(5,-2)"><ellipse rx="4.6" ry="7.4" fill="#1b2430"/><circle cx="-1.2" cy="-1.8" r="1.2" fill="#fff"/></g>
      <ellipse cx="-7" cy="6" rx="4" ry="2" fill="#ffb4b4" opacity="0.8"/>
      <ellipse cx="7" cy="6" rx="4" ry="2" fill="#ffb4b4" opacity="0.8"/>
      <path d="M-2,8 Q0,12 2,8" stroke="#9a5f3a" stroke-width="1.2" fill="none"/>
      <path id="cat-tail" d="M20,6 C36,6,48,-12,72,-6" stroke="#d28a4e" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>

    <!-- mini cat for small decorations -->
    <g id="mini-cat-light">
      <ellipse rx="12" ry="10" fill="#fff1cc" stroke="#d28a4e" stroke-width="1.0"/>
      <path d="M-6,-3 L-3,-12 L-0,-3 Z" fill="#fff1cc" stroke="#d28a4e" stroke-width="0.8"/>
      <path d="M6,-3 L3,-12 L0,-3 Z" fill="#fff1cc" stroke="#d28a4e" stroke-width="0.8"/>
      <ellipse rx="2.6" ry="3.8" cx="-4" cy="-1" fill="#213248"/><ellipse rx="2.6" ry="3.8" cx="4" cy="-1" fill="#213248"/>
      <path d="M-2,5 Q0,8 2,5" stroke="#c07a4d" stroke-width="0.8" fill="none"/>
    </g>
  </defs>

  <!-- background -->
  <rect width="100%" height="100%" fill="url(#bgLight)"/>

  <!-- title -->
  <g transform="translate(72,84)">
    <text x="0" y="0" font-family="sans-serif" font-size="44" fill="#0b2a3f" font-weight="800">Daisuke Muroka</text>
    <text x="0" y="46" font-family="sans-serif" font-size="16" fill="#405770">Head of Corporate IT — Corporate IT Division</text>
  </g>

  <!-- chibi businessman -->
  <g id="man" transform="translate(420,160)">
    <ellipse cx="0" cy="140" rx="120" ry="20" fill="rgba(0,0,0,0.06)"/>
    <path d="M-120,20 Q-120,120 -40,150 Q40,180 120,150 Q120,120 120,20 Z" fill="url(#suitSh)"/>
    <path d="M-70,32 Q0,100 70,32 Q0,48 -70,32 Z" fill="#1b588a" opacity="0.12"/>
    <g transform="translate(0,-72)">
      <path d="M-36,0 Q0,-74 36,0 Q30,54 -30,54 Q-36,52 -36,0 Z" fill="url(#skinSh)" stroke="#b77f53" stroke-width="1"/>
      <path d="M-36,-6 Q-8,-56 12,-44 Q40,-26 36,-8 Q28,6 12,10 Q-4,20 -36,6 Z" fill="#151a23"/>
      <g transform="translate(-8,-2)"><ellipse rx="12" ry="15" fill="#0d1b2a"/><ellipse rx="6" ry="8" fill="#5fd0ff" transform="translate(-1,-3)"/><circle cx="-2.8" cy="-4.0" r="2.4" fill="#fff"/></g>
      <g transform="translate(12,-2)"><ellipse rx="12" ry="15" fill="#0d1b2a"/><ellipse rx="6" ry="8" fill="#5fd0ff" transform="translate(-1,-3)"/><circle cx="-2.8" cy="-4.0" r="2.4" fill="#fff"/></g>
      <path d="M-8,10 Q0,14 8,10" stroke="#b06a3a" stroke-width="1.6" fill="none"/>
    </g>

    <!-- arms -->
    <g transform="translate(-110,20)">
      <path d="M0,0 Q18,10 46,8 L62,8 Q74,8 82,12 Q86,16 82,22 Q76,30 62,28 L46,28 Q28,32 12,22 Q2,14 0,8 Z" fill="#123b5a"/>
      <circle cx="86" cy="34" r="10" fill="url(#skinSh)" stroke="#b77f53" stroke-width="0.7"/>
      <animateTransform attributeName="transform" type="rotate" values="0 -20 14; -20 -20 14; 6 -20 14; 0 -20 14" dur="3s" repeatCount="indefinite"/>
    </g>
    <g transform="translate(110,24)">
      <path d="M0,0 Q-12,12 -44,10 L-60,10 Q-72,10 -80,14 Q-82,18 -80,24 Q-74,34 -60,32 L-38,32 Q-18,34 0,24 Z" fill="#123b5a"/>
      <circle cx="-86" cy="34" r="10" fill="url(#skinSh)" stroke="#b77f53" stroke-width="0.7"/>
      <animateTransform attributeName="transform" type="rotate" values="0 18 8; 22 18 8; -6 18 8; 0 18 8" dur="3.6s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- 20 cats: left cluster (6), center cluster (8), right cluster (6) -->
  <!-- LEFT cluster: x from 120..360 -->
  <g transform="translate(120,210)">
    <!-- 6 cats -->
    <g transform="translate(0,20)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-30; 0,0; 0,-12; 0,0" dur="3.6s" repeatCount="indefinite" begin="0s"/>
      <use href="#cat-tail" transform="translate(20,6)"><animateTransform attributeName="transform" type="rotate" values="0;18;-10;0" dur="0.9s" repeatCount="indefinite" additive="sum"/></use>
    </g>

    <g transform="translate(60,6)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; -12,-22; 10,-12; 0,0" dur="4.2s" repeatCount="indefinite" begin="0.3s"/>
      <use href="#cat-tail" transform="translate(20,6)"><animateTransform attributeName="transform" type="rotate" values="0;-20;8;0" dur="1.0s" repeatCount="indefinite" additive="sum"/></use>
    </g>

    <g transform="translate(120,-12)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 6,-24; -6,-12; 0,0" dur="3.4s" repeatCount="indefinite" begin="0.6s"/>
      <use href="#cat-tail" transform="translate(20,6)"><animateTransform attributeName="transform" type="rotate" values="0;28;-12;0" dur="0.8s" repeatCount="indefinite" additive="sum"/></use>
    </g>

    <g transform="translate(180,10)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; -80,-70; -160,-20; 0,0" dur="5.4s" repeatCount="indefinite" begin="0.2s"/>
      <use href="#cat-tail" transform="translate(20,6)"><animateTransform attributeName="transform" type="rotate" values="0;40;-20;0" dur="1.1s" repeatCount="indefinite" additive="sum"/></use>
    </g>

    <g transform="translate(240,6)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,6; 0,0" dur="2.2s" repeatCount="indefinite" begin="0.4s"/>
      <use href="#cat-tail" transform="translate(20,6)"><animateTransform attributeName="transform" type="rotate" values="0;12;-6;0" dur="1.0s" repeatCount="indefinite" additive="sum"/></use>
    </g>

    <g transform="translate(300,20)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-18; 0,0" dur="3.2s" repeatCount="indefinite" begin="0.9s"/>
      <use href="#cat-tail" transform="translate(20,6)"><animateTransform attributeName="transform" type="rotate" values="0;10;-6;0" dur="0.9s" repeatCount="indefinite" additive="sum"/></use>
    </g>
  </g>

  <!-- CENTER cluster: x around 480 -->
  <g transform="translate(400,220)">
    <!-- 8 cats arranged -->
    <g transform="translate(-160,28)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; -20,-36; 12,-14; 0,0" dur="4.6s" repeatCount="indefinite" begin="0.1s"/>
      <use href="#cat-tail" transform="translate(20,6)"><animateTransform attributeName="transform" type="rotate" values="0;-22;10;0" dur="1.2s" repeatCount="indefinite" additive="sum"/></use>
    </g>

    <g transform="translate(-80,6)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; -10,-20; 12,-12; 0,0" dur="4.0s" repeatCount="indefinite" begin="0.3s"/>
      <use href="#cat-tail" transform="translate(20,6)"><animateTransform attributeName="transform" type="rotate" values="0;20;-12;0" dur="1.0s" repeatCount="indefinite" additive="sum"/></use>
    </g>

    <g transform="translate(0,18)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="3.0s" repeatCount="indefinite" begin="0.5s"/>
      <use href="#cat-tail" transform="translate(20,6)"><animateTransform attributeName="transform" type="rotate" values="0;8;-4;0" dur="1.6s" repeatCount="indefinite" additive="sum"/></use>
    </g>

    <g transform="translate(80,28)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; -120,-84; -220,-40; 0,0" dur="5.2s" repeatCount="indefinite" begin="0.3s"/>
      <use href="#cat-tail" transform="translate(20,6)"><animateTransform attributeName="transform" type="rotate" values="0;36;-18;0" dur="1.0s" repeatCount="indefinite" additive="sum"/></use>
    </g>

    <g transform="translate(160,32)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 14,-10; -8,-6; 0,0" dur="3.2s" repeatCount="indefinite" begin="0.7s"/>
      <use href="#cat-tail" transform="translate(20,6)"><animateTransform attributeName="transform" type="rotate" values="0;28;-12;0" dur="1.0s" repeatCount="indefinite" additive="sum"/></use>
    </g>

    <!-- two tiny kittens -->
    <g transform="translate(240,8) scale(0.72)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 6,-8; 0,0" dur="2.6s" repeatCount="indefinite" begin="0.8s"/>
    </g>

    <g transform="translate(300,20) scale(0.72)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; -6,-10; 0,0" dur="2.8s" repeatCount="indefinite" begin="1.1s"/>
    </g>
  </g>

  <!-- RIGHT cluster: x from 820..1100 -->
  <g transform="translate(820,220)">
    <g transform="translate(0,-140)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,6; 0,0" dur="2.2s" repeatCount="indefinite" begin="0.2s"/>
      <use href="#cat-tail" transform="translate(20,6)"><animateTransform attributeName="transform" type="rotate" values="0;10;-6;0" dur="1.0s" repeatCount="indefinite" additive="sum"/></use>
    </g>

    <g transform="translate(48,26)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 12,-20; -6,-10; 0,0" dur="3.4s" repeatCount="indefinite" begin="0.5s"/>
      <use href="#cat-tail" transform="translate(20,6)"><animateTransform attributeName="transform" type="rotate" values="0;20;-10;0" dur="1.0s" repeatCount="indefinite" additive="sum"/></use>
    </g>

    <g transform="translate(140,40)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; -10,-8; 6,-6; 0,0" dur="3.6s" repeatCount="indefinite" begin="0.7s"/>
      <use href="#cat-tail" transform="translate(20,6)"><animateTransform attributeName="transform" type="rotate" values="0;12;-6;0" dur="1.1s" repeatCount="indefinite" additive="sum"/></use>
    </g>

    <g transform="translate(220,10)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; -14,-28; 12,-12; 0,0" dur="4.6s" repeatCount="indefinite" begin="0.4s"/>
      <use href="#cat-tail" transform="translate(20,6)"><animateTransform attributeName="transform" type="rotate" values="0;-22;10;0" dur="1.2s" repeatCount="indefinite" additive="sum"/></use>
    </g>

    <g transform="translate(300,32)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="3.0s" repeatCount="indefinite" begin="1.0s"/>
      <use href="#cat-tail" transform="translate(20,6)"><animateTransform attributeName="transform" type="rotate" values="0;8;-4;0" dur="1.4s" repeatCount="indefinite" additive="sum"/></use>
    </g>
  </g>

  <!-- small decorative sakura petals -->
  <g transform="translate(40,20)">
    <path d="M0,0 C4,6 12,10 20,8 C12,2 6,-2 0,0 Z" fill="#ffd9e6" opacity="0.85">
      <animateTransform attributeName="transform" type="translate" values="80,10; 300,90; 900,260" dur="9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.85;0.45;0" dur="9s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- sparkles -->
  <g transform="translate(1080,36)">
    <use href="#spark" transform="scale(0.9)"><animateTransform attributeName="transform" type="scale" values="0.9;1.3;0.9" dur="2.4s" repeatCount="indefinite"/></use>
  </g>

  <!-- footer caption -->
  <text x="72" y="320" font-family="sans-serif" font-size="13" fill="#405770">
    Corporate IT Division — Nurturing internal foundations with the warmth of everyday moments.
  </text>
</svg>
