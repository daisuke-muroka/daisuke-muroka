<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="160" viewBox="0 0 1000 160" role="img" aria-label="Playful cats header (light)">
  <defs>
    <linearGradient id="bgL" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fff8f0"/>
      <stop offset="1" stop-color="#f8f0ff"/>
    </linearGradient>
  </defs>
  <style>
    @keyframes jump1{0%,100%{transform:translate(0,0)}50%{transform:translate(0,-22px)}}
    @keyframes jump2{0%,100%{transform:translate(0,0)}30%{transform:translate(0,-18px)}60%{transform:translate(0,-10px)}}
    @keyframes roll{0%,100%{transform:rotate(0deg)}25%{transform:rotate(15deg)}75%{transform:rotate(-15deg)}}
    @keyframes stretch{0%,100%{transform:scaleY(1)}50%{transform:scaleY(0.85)}}
    @keyframes chase{0%{transform:translate(0,0)}25%{transform:translate(30px,-6px)}50%{transform:translate(60px,0)}75%{transform:translate(90px,-4px)}100%{transform:translate(120px,0)}}
    @keyframes yarnRoll{0%{transform:translate(0,0) rotate(0deg)}50%{transform:translate(60px,-4px) rotate(180deg)}100%{transform:translate(120px,0) rotate(360deg)}}
    @keyframes batPaw{0%,100%{transform:translate(0,0)}30%{transform:translate(2px,-14px)}60%{transform:translate(-2px,-8px)}}
    @keyframes flutter{0%{transform:translate(0,0)}25%{transform:translate(4px,-8px)}50%{transform:translate(-2px,-4px)}75%{transform:translate(6px,-10px)}100%{transform:translate(0,0)}}
    @keyframes wingFlap{0%,100%{transform:scaleX(1)}50%{transform:scaleX(0.3)}}
    @keyframes sleep{0%,100%{transform:scale(1)}50%{transform:scale(1.03)}}
    @keyframes zFloat{0%{opacity:0;transform:translate(0,0)}50%{opacity:0.6}100%{opacity:0;transform:translate(4px,-14px)}}
    @keyframes heartFloat{0%{opacity:0;transform:translateY(0)}50%{opacity:0.7}100%{opacity:0;transform:translateY(-18px)}}
    @keyframes petalDrift{0%{transform:translate(0,0);opacity:0.5}100%{transform:translate(200px,80px);opacity:0}}
    @keyframes pawBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-3px)}}
    @keyframes tailWag{0%,100%{transform:rotate(0deg)}25%{transform:rotate(12deg)}75%{transform:rotate(-12deg)}}
    @keyframes pounce{0%,100%{transform:translate(0,0)}50%{transform:translate(-20px,-18px)}}
    @keyframes tumble{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
    @keyframes peek{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}
  </style>

  <!-- background -->
  <rect width="100%" height="100%" rx="12" fill="url(#bgL)"/>

  <!-- paw prints decoration -->
  <g opacity="0.12">
    <g transform="translate(40,130)"><circle cx="0" cy="0" r="3.5" fill="#c8a080"/><circle cx="-3" cy="-4" r="1.5" fill="#c8a080"/><circle cx="3" cy="-4" r="1.5" fill="#c8a080"/><circle cx="-5" cy="-1.5" r="1.5" fill="#c8a080"/><circle cx="5" cy="-1.5" r="1.5" fill="#c8a080"/></g>
    <g transform="translate(160,140) rotate(-10)"><circle cx="0" cy="0" r="3" fill="#c8a080"/><circle cx="-2.5" cy="-3.5" r="1.3" fill="#c8a080"/><circle cx="2.5" cy="-3.5" r="1.3" fill="#c8a080"/><circle cx="-4.2" cy="-1.2" r="1.3" fill="#c8a080"/><circle cx="4.2" cy="-1.2" r="1.3" fill="#c8a080"/></g>
    <g transform="translate(500,145) rotate(8)"><circle cx="0" cy="0" r="3" fill="#c8a080"/><circle cx="-2.5" cy="-3.5" r="1.3" fill="#c8a080"/><circle cx="2.5" cy="-3.5" r="1.3" fill="#c8a080"/><circle cx="-4.2" cy="-1.2" r="1.3" fill="#c8a080"/><circle cx="4.2" cy="-1.2" r="1.3" fill="#c8a080"/></g>
    <g transform="translate(830,135) rotate(-5)"><circle cx="0" cy="0" r="3.5" fill="#c8a080"/><circle cx="-3" cy="-4" r="1.5" fill="#c8a080"/><circle cx="3" cy="-4" r="1.5" fill="#c8a080"/><circle cx="-5" cy="-1.5" r="1.5" fill="#c8a080"/><circle cx="5" cy="-1.5" r="1.5" fill="#c8a080"/></g>
    <g transform="translate(950,140) rotate(12)"><circle cx="0" cy="0" r="2.8" fill="#c8a080"/><circle cx="-2.3" cy="-3.2" r="1.2" fill="#c8a080"/><circle cx="2.3" cy="-3.2" r="1.2" fill="#c8a080"/><circle cx="-3.8" cy="-1" r="1.2" fill="#c8a080"/><circle cx="3.8" cy="-1" r="1.2" fill="#c8a080"/></g>
  </g>

  <!-- sakura petals -->
  <path d="M0,0 C3,5 9,8 15,6 C9,1.5 4.5,-1.5 0,0Z" fill="#ffd0e0" opacity="0.4">
    <animateTransform attributeName="transform" type="translate" values="80,8;280,88" dur="11s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.4;0.2;0" dur="11s" repeatCount="indefinite"/>
  </path>
  <path d="M0,0 C3,5 9,8 15,6 C9,1.5 4.5,-1.5 0,0Z" fill="#ffe0ec" opacity="0.35">
    <animateTransform attributeName="transform" type="translate" values="500,5;700,90" dur="13s" repeatCount="indefinite" begin="4s"/>
    <animate attributeName="opacity" values="0.35;0.15;0" dur="13s" repeatCount="indefinite" begin="4s"/>
  </path>
  <path d="M0,0 C3,5 9,8 15,6 C9,1.5 4.5,-1.5 0,0Z" fill="#ffc8d8" opacity="0.3">
    <animateTransform attributeName="transform" type="translate" values="750,3;950,80" dur="9s" repeatCount="indefinite" begin="7s"/>
    <animate attributeName="opacity" values="0.3;0.1;0" dur="9s" repeatCount="indefinite" begin="7s"/>
  </path>

  <!-- ===== CAT 1: Cream tabby - jumping ===== -->
  <g transform="translate(60,100)" style="animation:jump1 2.5s ease-in-out infinite">
    <circle cx="0" cy="0" r="14" fill="#fff1cc" stroke="#d28a4e" stroke-width="0.8"/>
    <path d="M-11,-8.5 L-8.5,-20 L-4.5,-8.5" fill="#fff1cc" stroke="#d28a4e" stroke-width="0.6"/>
    <path d="M11,-8.5 L8.5,-20 L4.5,-8.5" fill="#fff1cc" stroke="#d28a4e" stroke-width="0.6"/>
    <path d="M-9,-16 L-7,-12" stroke="#c47830" stroke-width="0.5" opacity="0.5"/>
    <path d="M9,-16 L7,-12" stroke="#c47830" stroke-width="0.5" opacity="0.5"/>
    <g transform="translate(-4,-3)"><ellipse rx="3.5" ry="4.5" fill="#1b2430"/><circle cx="-1" cy="-1.2" r="1.2" fill="#fff"/></g>
    <g transform="translate(4,-3)"><ellipse rx="3.5" ry="4.5" fill="#1b2430"/><circle cx="-1" cy="-1.2" r="1.2" fill="#fff"/></g>
    <ellipse cx="-7" cy="1.5" rx="3.5" ry="2" fill="#ffb4b4" opacity="0.45"/>
    <ellipse cx="7" cy="1.5" rx="3.5" ry="2" fill="#ffb4b4" opacity="0.45"/>
    <path d="M-0.7,3 L0,2 L0.7,3" fill="#e8889a" stroke="#e8889a" stroke-width="0.3"/>
    <path d="M-2,4.5 Q0,7 2,4.5" stroke="#9a5f3a" stroke-width="0.6" fill="none"/>
    <line x1="-16" y1="-1.5" x2="-10" y2="-0.8" stroke="#d28a4e" stroke-width="0.4" opacity="0.35"/>
    <line x1="16" y1="-1.5" x2="10" y2="-0.8" stroke="#d28a4e" stroke-width="0.4" opacity="0.35"/>
  </g>
  <!-- heart above jumping cat -->
  <g transform="translate(62,68)">
    <path d="M0,-4 C-2,-8 -8,-8 -8,-3 C-8,2 0,7 0,7 C0,7 8,2 8,-3 C8,-8 2,-8 0,-4Z" fill="#ff8aaa" transform="scale(0.4)" style="animation:heartFloat 2.5s ease-in-out infinite"/>
  </g>

  <!-- ===== CAT 2: Grey - rolling ===== -->
  <g transform="translate(150,110)" style="animation:roll 3.5s ease-in-out infinite 0.5s">
    <circle cx="0" cy="0" r="12" fill="#d0d4dc" stroke="#8a8e96" stroke-width="0.8"/>
    <path d="M-9.5,-7 L-7.5,-17 L-4,-7" fill="#d0d4dc" stroke="#8a8e96" stroke-width="0.6"/>
    <path d="M9.5,-7 L7.5,-17 L4,-7" fill="#d0d4dc" stroke="#8a8e96" stroke-width="0.6"/>
    <g transform="translate(-3.5,-2.5)"><ellipse rx="3" ry="4" fill="#1b2430"/><circle cx="-0.9" cy="-1" r="1" fill="#fff"/></g>
    <g transform="translate(3.5,-2.5)"><ellipse rx="3" ry="4" fill="#1b2430"/><circle cx="-0.9" cy="-1" r="1" fill="#fff"/></g>
    <ellipse cx="-6" cy="1" rx="3" ry="1.8" fill="#e8b4c4" opacity="0.35"/>
    <ellipse cx="6" cy="1" rx="3" ry="1.8" fill="#e8b4c4" opacity="0.35"/>
    <path d="M-1.5,3.5 Q0,6 1.5,3.5" stroke="#6a6a6a" stroke-width="0.5" fill="none"/>
  </g>

  <!-- ===== CAT 3: White - stretching ===== -->
  <g transform="translate(250,105)" style="animation:stretch 4s ease-in-out infinite 1s">
    <circle cx="0" cy="0" r="13" fill="#fefefe" stroke="#c8c0b8" stroke-width="0.8"/>
    <path d="M-10,-8 L-8,-18 L-4.5,-8" fill="#fefefe" stroke="#c8c0b8" stroke-width="0.6"/>
    <path d="M10,-8 L8,-18 L4.5,-8" fill="#fefefe" stroke="#c8c0b8" stroke-width="0.6"/>
    <g transform="translate(-3.8,-2.8)"><ellipse rx="3.2" ry="4.2" fill="#1b2430"/><circle cx="-0.9" cy="-1" r="1.1" fill="#fff"/></g>
    <g transform="translate(3.8,-2.8)"><ellipse rx="3.2" ry="4.2" fill="#1b2430"/><circle cx="-0.9" cy="-1" r="1.1" fill="#fff"/></g>
    <ellipse cx="-6.5" cy="1.2" rx="3.2" ry="1.8" fill="#ffb4b4" opacity="0.35"/>
    <ellipse cx="6.5" cy="1.2" rx="3.2" ry="1.8" fill="#ffb4b4" opacity="0.35"/>
    <path d="M-1.8,4 Q0,6.5 1.8,4" stroke="#b0a0a0" stroke-width="0.5" fill="none"/>
  </g>

  <!-- ===== CAT 4: Calico - chasing yarn ===== -->
  <g transform="translate(340,115)">
    <g style="animation:chase 5s linear infinite 0.3s">
      <circle cx="0" cy="0" r="11" fill="#fff1cc" stroke="#d28a4e" stroke-width="0.7"/>
      <path d="M-8.5,-6.5 L-6.8,-15 L-3.8,-6.5" fill="#fff1cc" stroke="#d28a4e" stroke-width="0.5"/>
      <path d="M8.5,-6.5 L6.8,-15 L3.8,-6.5" fill="#fff1cc" stroke="#d28a4e" stroke-width="0.5"/>
      <!-- calico patches -->
      <circle cx="-5" cy="-5" r="4" fill="#e8884a" opacity="0.4"/>
      <circle cx="6" cy="2" r="3.5" fill="#3a3a3a" opacity="0.2"/>
      <g transform="translate(-3,-2)"><ellipse rx="2.8" ry="3.6" fill="#1b2430"/><circle cx="-0.8" cy="-0.9" r="0.9" fill="#fff"/></g>
      <g transform="translate(3,-2)"><ellipse rx="2.8" ry="3.6" fill="#1b2430"/><circle cx="-0.8" cy="-0.9" r="0.9" fill="#fff"/></g>
      <path d="M-1.3,3 Q0,5.5 1.3,3" stroke="#9a5f3a" stroke-width="0.45" fill="none"/>
    </g>
    <!-- yarn ball -->
    <g style="animation:yarnRoll 5s linear infinite 0.3s" transform="translate(30,-3)">
      <circle cx="0" cy="0" r="5" fill="#ff6b8a"/>
      <path d="M-3,-3 Q0,2 3,-1 Q1,3 -2,1" stroke="#ff4070" stroke-width="0.6" fill="none"/>
      <path d="M4,0 Q6,4 2,6" stroke="#ff4070" stroke-width="0.5" fill="none" opacity="0.6"/>
    </g>
  </g>

  <!-- ===== CAT 5: Cream - batting butterfly ===== -->
  <g transform="translate(540,95)">
    <g style="animation:batPaw 3s ease-in-out infinite 0.8s">
      <circle cx="0" cy="0" r="13" fill="#fff1cc" stroke="#d28a4e" stroke-width="0.8"/>
      <path d="M-10,-8 L-8,-18 L-4.5,-8" fill="#fff1cc" stroke="#d28a4e" stroke-width="0.6"/>
      <path d="M10,-8 L8,-18 L4.5,-8" fill="#fff1cc" stroke="#d28a4e" stroke-width="0.6"/>
      <g transform="translate(-3.8,-2.8)"><ellipse rx="3.2" ry="4.5" fill="#1b2430"/><circle cx="-0.9" cy="-1.2" r="1.1" fill="#fff"/></g>
      <g transform="translate(3.8,-2.8)"><ellipse rx="3.2" ry="4.5" fill="#1b2430"/><circle cx="-0.9" cy="-1.2" r="1.1" fill="#fff"/></g>
      <ellipse cx="-6.5" cy="1.5" rx="3.2" ry="1.8" fill="#ffb4b4" opacity="0.45"/>
      <ellipse cx="6.5" cy="1.5" rx="3.2" ry="1.8" fill="#ffb4b4" opacity="0.45"/>
      <path d="M-0.6,2.8 L0,2 L0.6,2.8" fill="#e8889a" stroke="#e8889a" stroke-width="0.3"/>
      <path d="M-1.8,4.2 Q0,6.8 1.8,4.2" stroke="#9a5f3a" stroke-width="0.5" fill="none"/>
    </g>
    <!-- butterfly -->
    <g style="animation:flutter 3s ease-in-out infinite 0.8s" transform="translate(8,-28)">
      <path d="M0,0 C-5,-7 -12,-5 -8,0 C-12,5 -5,7 0,0" fill="#a0c8ff" opacity="0.75" style="animation:wingFlap 0.4s infinite"/>
      <path d="M0,0 C5,-7 12,-5 8,0 C12,5 5,7 0,0" fill="#c0a0ff" opacity="0.75" style="animation:wingFlap 0.4s infinite"/>
      <circle cx="0" cy="0" r="1" fill="#444"/>
    </g>
  </g>

  <!-- ===== CAT 6: Grey kitten - tumbling ===== -->
  <g transform="translate(660,115)">
    <g style="animation:tumble 4s linear infinite 1.2s">
      <circle cx="0" cy="0" r="9" fill="#d0d4dc" stroke="#8a8e96" stroke-width="0.6"/>
      <path d="M-7,-5 L-5.5,-12 L-3,-5" fill="#d0d4dc" stroke="#8a8e96" stroke-width="0.5"/>
      <path d="M7,-5 L5.5,-12 L3,-5" fill="#d0d4dc" stroke="#8a8e96" stroke-width="0.5"/>
      <g transform="translate(-2.5,-1.8)"><ellipse rx="2.2" ry="3" fill="#1b2430"/><circle cx="-0.6" cy="-0.7" r="0.7" fill="#fff"/></g>
      <g transform="translate(2.5,-1.8)"><ellipse rx="2.2" ry="3" fill="#1b2430"/><circle cx="-0.6" cy="-0.7" r="0.7" fill="#fff"/></g>
      <path d="M-1,2.5 Q0,4 1,2.5" stroke="#6a6a6a" stroke-width="0.4" fill="none"/>
    </g>
  </g>

  <!-- ===== CAT 7: White - pouncing ===== -->
  <g transform="translate(750,100)" style="animation:pounce 3.5s ease-in-out infinite 0.6s">
    <circle cx="0" cy="0" r="12" fill="#fefefe" stroke="#c8c0b8" stroke-width="0.7"/>
    <path d="M-9.5,-7 L-7.5,-16 L-4,-7" fill="#fefefe" stroke="#c8c0b8" stroke-width="0.55"/>
    <path d="M9.5,-7 L7.5,-16 L4,-7" fill="#fefefe" stroke="#c8c0b8" stroke-width="0.55"/>
    <g transform="translate(-3.5,-2.5)"><ellipse rx="3" ry="4" fill="#1b2430"/><circle cx="-0.8" cy="-1" r="1" fill="#fff"/></g>
    <g transform="translate(3.5,-2.5)"><ellipse rx="3" ry="4" fill="#1b2430"/><circle cx="-0.8" cy="-1" r="1" fill="#fff"/></g>
    <ellipse cx="-6" cy="1" rx="3" ry="1.8" fill="#ffb4b4" opacity="0.35"/>
    <ellipse cx="6" cy="1" rx="3" ry="1.8" fill="#ffb4b4" opacity="0.35"/>
    <path d="M-1.5,3.5 Q0,5.8 1.5,3.5" stroke="#b0a0a0" stroke-width="0.5" fill="none"/>
  </g>

  <!-- ===== CAT 8: Cream kitten - peek ===== -->
  <g transform="translate(850,108)" style="animation:peek 2.8s ease-in-out infinite 2s">
    <circle cx="0" cy="0" r="10" fill="#fff1cc" stroke="#d28a4e" stroke-width="0.7"/>
    <path d="M-7.8,-6 L-6,-14 L-3.2,-6" fill="#fff1cc" stroke="#d28a4e" stroke-width="0.5"/>
    <path d="M7.8,-6 L6,-14 L3.2,-6" fill="#fff1cc" stroke="#d28a4e" stroke-width="0.5"/>
    <g transform="translate(-3,-2)"><ellipse rx="2.5" ry="3.5" fill="#1b2430"/><circle cx="-0.8" cy="-1" r="0.9" fill="#fff"/></g>
    <g transform="translate(3,-2)"><ellipse rx="2.5" ry="3.5" fill="#1b2430"/><circle cx="-0.8" cy="-1" r="0.9" fill="#fff"/></g>
    <ellipse cx="-5.5" cy="1" rx="2.5" ry="1.5" fill="#ffb4b4" opacity="0.5"/>
    <ellipse cx="5.5" cy="1" rx="2.5" ry="1.5" fill="#ffb4b4" opacity="0.5"/>
    <path d="M-0.5,2 L0,1.5 L0.5,2" fill="#e8889a" stroke="#e8889a" stroke-width="0.3"/>
    <path d="M-1.3,3 Q0,5 1.3,3" stroke="#9a5f3a" stroke-width="0.4" fill="none"/>
  </g>

  <!-- ===== CAT 9: White sleeping ===== -->
  <g transform="translate(935,118)" style="animation:sleep 3s ease-in-out infinite">
    <circle cx="0" cy="0" r="11" fill="#fefefe" stroke="#c8c0b8" stroke-width="0.7"/>
    <path d="M-8.5,-6.5 L-6.5,-15 L-3.5,-6.5" fill="#fefefe" stroke="#c8c0b8" stroke-width="0.55"/>
    <path d="M8.5,-6.5 L6.5,-15 L3.5,-6.5" fill="#fefefe" stroke="#c8c0b8" stroke-width="0.55"/>
    <!-- closed eyes (sleeping) -->
    <path d="M-5.5,-2 Q-3.5,0.5 -1.5,-2" stroke="#1b2430" stroke-width="1" fill="none"/>
    <path d="M1.5,-2 Q3.5,0.5 5.5,-2" stroke="#1b2430" stroke-width="1" fill="none"/>
    <path d="M-1.3,3 Q0,5.2 1.3,3" stroke="#b0a0a0" stroke-width="0.4" fill="none"/>
  </g>
  <!-- zzz -->
  <g transform="translate(950,94)">
    <text font-family="sans-serif" font-size="8" fill="#aab0c0" opacity="0" style="animation:zFloat 2.5s ease-out infinite">z</text>
  </g>
  <g transform="translate(958,88)">
    <text font-family="sans-serif" font-size="6" fill="#aab0c0" opacity="0" style="animation:zFloat 2.5s ease-out infinite 0.8s">z</text>
  </g>

  <!-- floating hearts -->
  <g transform="translate(120,70)">
    <path d="M0,-3 C-1.5,-6 -6,-6 -6,-2.3 C-6,1.5 0,5.3 0,5.3 C0,5.3 6,1.5 6,-2.3 C6,-6 1.5,-6 0,-3Z" fill="#ff8aaa" transform="scale(0.35)" opacity="0" style="animation:heartFloat 3.5s ease-in-out infinite 1s"/>
  </g>
  <g transform="translate(420,60)">
    <path d="M0,-3 C-1.5,-6 -6,-6 -6,-2.3 C-6,1.5 0,5.3 0,5.3 C0,5.3 6,1.5 6,-2.3 C6,-6 1.5,-6 0,-3Z" fill="#ffaacc" transform="scale(0.3)" opacity="0" style="animation:heartFloat 4s ease-in-out infinite 2.5s"/>
  </g>
  <g transform="translate(700,55)">
    <path d="M0,-3 C-1.5,-6 -6,-6 -6,-2.3 C-6,1.5 0,5.3 0,5.3 C0,5.3 6,1.5 6,-2.3 C6,-6 1.5,-6 0,-3Z" fill="#ff8aaa" transform="scale(0.4)" opacity="0" style="animation:heartFloat 3.8s ease-in-out infinite 0.5s"/>
  </g>
  <g transform="translate(890,65)">
    <path d="M0,-3 C-1.5,-6 -6,-6 -6,-2.3 C-6,1.5 0,5.3 0,5.3 C0,5.3 6,1.5 6,-2.3 C6,-6 1.5,-6 0,-3Z" fill="#ffaacc" transform="scale(0.3)" opacity="0" style="animation:heartFloat 4.2s ease-in-out infinite 3s"/>
  </g>

  <!-- sparkles -->
  <g transform="translate(30,30)">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5Z" fill="#ffe98a" opacity="0.7">
      <animateTransform attributeName="transform" type="scale" values="0.6;1.1;0.6" dur="2.2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0.7;0.2;0.7" dur="2.2s" repeatCount="indefinite"/>
    </path>
  </g>
  <g transform="translate(970,25)">
    <path d="M0,-6 L1.5,-1.5 L6,0 L1.5,1.5 L0,6 L-1.5,1.5 L-6,0 L-1.5,-1.5Z" fill="#ffe98a" opacity="0.6">
      <animateTransform attributeName="transform" type="scale" values="0.5;0.9;0.5" dur="2.8s" repeatCount="indefinite" begin="1s"/>
      <animate attributeName="opacity" values="0.6;0.15;0.6" dur="2.8s" repeatCount="indefinite" begin="1s"/>
    </path>
  </g>
</svg>