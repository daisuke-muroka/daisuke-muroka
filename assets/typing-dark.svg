<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1000" height="180" viewBox="0 0 1000 180" role="img" aria-label="Typing introduction with cats (dark)">
  <defs>
    <linearGradient id="cardBg" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0b1b2b"/>
      <stop offset="1" stop-color="#072033"/>
    </linearGradient>
  </defs>

  <style>
    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0} }
    @keyframes revealLine1 { 0%,3%{width:420px} 100%{width:0px} }
    @keyframes revealLine2 { 0%,36%{width:420px} 100%{width:0px} }
    @keyframes revealLine3 { 0%,64%{width:420px} 100%{width:0px} }
    @keyframes bounce1 { 0%,100%{transform:translate(440px,8px)} 50%{transform:translate(440px,-10px)} }
    @keyframes walk1 { 0%{transform:translate(0,0)} 14%{transform:translate(40px,-8px)} 28%{transform:translate(90px,0)} 43%{transform:translate(140px,-6px)} 57%{transform:translate(200px,0)} 71%{transform:translate(260px,-4px)} 100%{transform:translate(320px,0)} }
    @keyframes groupBob { 0%,100%{transform:translate(440px,2px)} 50%{transform:translate(440px,-4px)} }
    @keyframes stroll1 { 0%{transform:translate(0,0)} 25%{transform:translate(30px,-6px)} 50%{transform:translate(60px,0)} 75%{transform:translate(90px,-4px)} 100%{transform:translate(120px,0)} }
    @keyframes stroll2 { 0%{transform:translate(0,0)} 25%{transform:translate(40px,-8px)} 50%{transform:translate(80px,0)} 75%{transform:translate(120px,-6px)} 100%{transform:translate(160px,0)} }
    @keyframes sparkPulse { 0%,100%{transform:scale(0.6);opacity:1} 50%{transform:scale(1.1);opacity:0.25} }
    .caret { animation: blink 0.9s infinite; }
    .cover1 { animation: revealLine1 2.6s 0.2s forwards; }
    .cover2 { animation: revealLine2 3.6s 0.2s forwards; }
    .cover3 { animation: revealLine3 4.8s 0.2s forwards; }
    .cat-bounce1 { animation: bounce1 3.2s 2.8s infinite; }
    .cat-walk1 { animation: walk1 5.5s 3.8s infinite; }
    .cat-group1 { animation: groupBob 2.5s infinite; }
    .cat-stroll1 { animation: stroll1 5s 1.6s infinite; }
    .cat-stroll2 { animation: stroll2 6s 2.5s infinite; }
    .cat-stroll3 { animation: stroll2 5.8s 3s infinite; }
    .spark { animation: sparkPulse 2.4s infinite; }
  </style>

  <!-- card background -->
  <rect x="10" y="10" rx="14" ry="14" width="980" height="160" fill="url(#cardBg)" stroke="#153144"/>

  <!-- header text -->
  <text x="56" y="46" font-family="Segoe UI,sans-serif" font-size="18" fill="#dbefff" font-weight="800">Hello — I am</text>
  <text x="56" y="68" font-family="Segoe UI,sans-serif" font-size="13" fill="#ffd2e6" font-weight="700">A businessman who loves cats</text>

  <!-- typing content group -->
  <g transform="translate(56,92)">
    <!-- caret -->
    <rect class="caret" x="420" y="-18" width="3" height="20" fill="#ffd2e6"/>

    <!-- line 1 -->
    <g>
      <text x="0" y="0" font-family="Segoe UI,sans-serif" font-size="16" fill="#eaf6ff" font-weight="700">Daisuke Muroka — Head of Corporate IT</text>
      <rect class="cover1" x="0" y="-18" width="420" height="22" fill="#072033"/>
      <!-- inline cream cat -->
      <g class="cat-bounce1">
        <circle cx="0" cy="0" r="10" fill="#fff6d6" stroke="#c98b52" stroke-width="0.8" transform="scale(0.85)"/>
        <path d="M-8,-6 L-6,-14 L-3,-6" fill="#fff6d6" stroke="#c98b52" stroke-width="0.6" transform="scale(0.85)"/>
        <path d="M8,-6 L6,-14 L3,-6" fill="#fff6d6" stroke="#c98b52" stroke-width="0.6" transform="scale(0.85)"/>
        <g transform="scale(0.85) translate(-3,-2)"><ellipse rx="2.5" ry="3.5" fill="#0a1420"/><circle cx="-0.8" cy="-1" r="0.9" fill="#fff"/></g>
        <g transform="scale(0.85) translate(3,-2)"><ellipse rx="2.5" ry="3.5" fill="#0a1420"/><circle cx="-0.8" cy="-1" r="0.9" fill="#fff"/></g>
        <ellipse cx="-4.7" cy="0.85" rx="2.1" ry="1.3" fill="#ffb4b4" opacity="0.5"/>
        <ellipse cx="4.7" cy="0.85" rx="2.1" ry="1.3" fill="#ffb4b4" opacity="0.5"/>
        <path d="M-1.3,2.5 Q0,4.2 1.3,2.5" stroke="#9a5f3a" stroke-width="0.4" fill="none"/>
      </g>
    </g>

    <!-- line 2 -->
    <g transform="translate(0,30)">
      <text x="0" y="0" font-family="Segoe UI,sans-serif" font-size="14" fill="#bfe6ff">ISMS · Information Security · Identity &amp; Automation</text>
      <rect class="cover2" x="0" y="-18" width="420" height="22" fill="#072033"/>
      <!-- inline grey cat walking -->
      <g class="cat-walk1" transform="translate(-20,2)">
        <circle cx="0" cy="0" r="7.5" fill="#b8bcc8" stroke="#707480" stroke-width="0.6"/>
        <path d="M-6,-4.5 L-4.5,-10.5 L-2.25,-4.5" fill="#b8bcc8" stroke="#707480" stroke-width="0.45"/>
        <path d="M6,-4.5 L4.5,-10.5 L2.25,-4.5" fill="#b8bcc8" stroke="#707480" stroke-width="0.45"/>
        <g transform="translate(-2.25,-1.5)"><ellipse rx="1.9" ry="2.6" fill="#0a1420"/><circle cx="-0.6" cy="-0.75" r="0.7" fill="#fff"/></g>
        <g transform="translate(2.25,-1.5)"><ellipse rx="1.9" ry="2.6" fill="#0a1420"/><circle cx="-0.6" cy="-0.75" r="0.7" fill="#fff"/></g>
        <path d="M-1.1,2.25 Q0,3.75 1.1,2.25" stroke="#6a6a6a" stroke-width="0.4" fill="none"/>
      </g>
    </g>

    <!-- line 3 -->
    <g transform="translate(0,60)">
      <text x="0" y="0" font-family="Segoe UI,sans-serif" font-size="14" fill="#bfe6ff">I play with many cats — nurturing teams with gentle care.</text>
      <rect class="cover3" x="0" y="-18" width="420" height="22" fill="#072033"/>
      <!-- inline white + cream cat group -->
      <g class="cat-group1">
        <g transform="translate(-10,0)">
          <circle cx="0" cy="0" r="7" fill="#f0f0f0" stroke="#a8a0a0" stroke-width="0.6"/>
          <path d="M-5.6,-4.2 L-4.2,-9.8 L-2.1,-4.2" fill="#f0f0f0" stroke="#a8a0a0" stroke-width="0.4"/>
          <path d="M5.6,-4.2 L4.2,-9.8 L2.1,-4.2" fill="#f0f0f0" stroke="#a8a0a0" stroke-width="0.4"/>
          <g transform="translate(-2.1,-1.4)"><ellipse rx="1.75" ry="2.45" fill="#0a1420"/><circle cx="-0.56" cy="-0.7" r="0.63" fill="#fff"/></g>
          <g transform="translate(2.1,-1.4)"><ellipse rx="1.75" ry="2.45" fill="#0a1420"/><circle cx="-0.56" cy="-0.7" r="0.63" fill="#fff"/></g>
          <path d="M-1.05,2.1 Q0,3.5 1.05,2.1" stroke="#909090" stroke-width="0.35" fill="none"/>
        </g>
        <g transform="translate(14,2)">
          <circle cx="0" cy="0" r="7.5" fill="#fff6d6" stroke="#c98b52" stroke-width="0.6"/>
          <path d="M-6,-4.5 L-4.5,-10.5 L-2.25,-4.5" fill="#fff6d6" stroke="#c98b52" stroke-width="0.45"/>
          <path d="M6,-4.5 L4.5,-10.5 L2.25,-4.5" fill="#fff6d6" stroke="#c98b52" stroke-width="0.45"/>
          <g transform="translate(-2.25,-1.5)"><ellipse rx="1.9" ry="2.6" fill="#0a1420"/><circle cx="-0.6" cy="-0.75" r="0.7" fill="#fff"/></g>
          <g transform="translate(2.25,-1.5)"><ellipse rx="1.9" ry="2.6" fill="#0a1420"/><circle cx="-0.6" cy="-0.75" r="0.7" fill="#fff"/></g>
          <path d="M-1.1,2.25 Q0,3.75 1.1,2.25" stroke="#9a5f3a" stroke-width="0.4" fill="none"/>
        </g>
      </g>
    </g>

    <!-- strolling cats at bottom -->
    <g transform="translate(0,90)">
      <!-- cream cat strolling -->
      <g class="cat-stroll1" transform="translate(10,6)">
        <circle cx="0" cy="0" r="8" fill="#fff6d6" stroke="#c98b52" stroke-width="0.6"/>
        <path d="M-6.4,-4.8 L-4.8,-11.2 L-2.4,-4.8" fill="#fff6d6" stroke="#c98b52" stroke-width="0.5"/>
        <path d="M6.4,-4.8 L4.8,-11.2 L2.4,-4.8" fill="#fff6d6" stroke="#c98b52" stroke-width="0.5"/>
        <g transform="translate(-2.4,-1.6)"><ellipse rx="2" ry="2.8" fill="#0a1420"/><circle cx="-0.64" cy="-0.8" r="0.72" fill="#fff"/></g>
        <g transform="translate(2.4,-1.6)"><ellipse rx="2" ry="2.8" fill="#0a1420"/><circle cx="-0.64" cy="-0.8" r="0.72" fill="#fff"/></g>
        <ellipse cx="-4.4" cy="0.8" rx="2" ry="1.2" fill="#ffb4b4" opacity="0.5"/>
        <ellipse cx="4.4" cy="0.8" rx="2" ry="1.2" fill="#ffb4b4" opacity="0.5"/>
        <path d="M-1.2,2.4 Q0,4 1.2,2.4" stroke="#9a5f3a" stroke-width="0.4" fill="none"/>
      </g>
      <!-- white cat strolling -->
      <g class="cat-stroll2" transform="translate(200,4)">
        <circle cx="0" cy="0" r="7" fill="#f0f0f0" stroke="#a8a0a0" stroke-width="0.6"/>
        <path d="M-5.6,-4.2 L-4.2,-9.8 L-2.1,-4.2" fill="#f0f0f0" stroke="#a8a0a0" stroke-width="0.4"/>
        <path d="M5.6,-4.2 L4.2,-9.8 L2.1,-4.2" fill="#f0f0f0" stroke="#a8a0a0" stroke-width="0.4"/>
        <g transform="translate(-2.1,-1.4)"><ellipse rx="1.75" ry="2.45" fill="#0a1420"/><circle cx="-0.56" cy="-0.7" r="0.63" fill="#fff"/></g>
        <g transform="translate(2.1,-1.4)"><ellipse rx="1.75" ry="2.45" fill="#0a1420"/><circle cx="-0.56" cy="-0.7" r="0.63" fill="#fff"/></g>
        <path d="M-1.05,2.1 Q0,3.5 1.05,2.1" stroke="#909090" stroke-width="0.35" fill="none"/>
      </g>
      <!-- grey cat strolling -->
      <g class="cat-stroll3" transform="translate(450,6)">
        <circle cx="0" cy="0" r="7.5" fill="#b8bcc8" stroke="#707480" stroke-width="0.6"/>
        <path d="M-6,-4.5 L-4.5,-10.5 L-2.25,-4.5" fill="#b8bcc8" stroke="#707480" stroke-width="0.45"/>
        <path d="M6,-4.5 L4.5,-10.5 L2.25,-4.5" fill="#b8bcc8" stroke="#707480" stroke-width="0.45"/>
        <g transform="translate(-2.25,-1.5)"><ellipse rx="1.9" ry="2.6" fill="#0a1420"/><circle cx="-0.6" cy="-0.75" r="0.7" fill="#fff"/></g>
        <g transform="translate(2.25,-1.5)"><ellipse rx="1.9" ry="2.6" fill="#0a1420"/><circle cx="-0.6" cy="-0.75" r="0.7" fill="#fff"/></g>
        <path d="M-1.1,2.25 Q0,3.75 1.1,2.25" stroke="#6a6a6a" stroke-width="0.4" fill="none"/>
      </g>
    </g>
  </g>

  <!-- sparkle -->
  <g transform="translate(920,32)">
    <path class="spark" d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="#ffe98a"/>
  </g>
</svg>