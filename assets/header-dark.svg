<?xml version="1.0" encoding="utf-8"?>
<!-- assets/header-dark.svg -->
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="340" viewBox="0 0 1200 340" role="img" aria-label="Anime-style businessman playing with many cats (dark mode)">
  <defs>
    <!-- dark palette -->
    <linearGradient id="bg" x1="0" x2="1">
      <stop offset="0" stop-color="#061426"/>
      <stop offset="1" stop-color="#112b4a"/>
    </linearGradient>

    <linearGradient id="skinSh" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffdcb2"/>
      <stop offset="1" stop-color="#f0b892"/>
    </linearGradient>
    <linearGradient id="suitSh" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#0e3556"/>
      <stop offset="1" stop-color="#0a2034"/>
    </linearGradient>

    <!-- sparkle -->
    <g id="spark"><path d="M0,-8 L2,-2 L8,0 L2,2 L0,8 L-2,2 L-8,0 L-2,-2 Z" fill="#ffe98a"/></g>

    <!-- cat chibi definition -->
    <g id="cat-chibi">
      <ellipse rx="18" ry="16" cx="0" cy="0" fill="#fff6d6" stroke="#c98b52" stroke-width="1.4"/>
      <path d="M-12,-6 L-6,-22 L-2,-6 Z" fill="#fff6d6" stroke="#c98b52" stroke-width="1"/>
      <path d="M12,-6 L6,-22 L2,-6 Z" fill="#fff6d6" stroke="#c98b52" stroke-width="1"/>
      <g transform="translate(-5,-2)"><ellipse rx="4.6" ry="7.4" fill="#1b2430"/><circle cx="-1.2" cy="-1.8" r="1.2" fill="#fff"/></g>
      <g transform="translate(5,-2)"><ellipse rx="4.6" ry="7.4" fill="#1b2430"/><circle cx="-1.2" cy="-1.8" r="1.2" fill="#fff"/></g>
      <ellipse cx="-7" cy="6" rx="4" ry="2" fill="#ffb4b4" opacity="0.8"/><ellipse cx="7" cy="6" rx="4" ry="2" fill="#ffb4b4" opacity="0.8"/>
      <path d="M-2,8 Q0,12 2,8" stroke="#9a5f3a" stroke-width="1.2" fill="none"/>
      <path id="cat-tail" d="M20,6 C36,6,48,-12,72,-6" stroke="#c98b52" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
  </defs>

  <!-- background -->
  <rect width="100%" height="100%" fill="url(#bg)"/>

  <!-- title -->
  <g transform="translate(72,84)">
    <text x="0" y="0" font-family="sans-serif" font-size="44" fill="#fff" font-weight="800" stroke="#000" stroke-opacity="0.06" stroke-width="0.6">Daisuke Muroka</text>
    <text x="0" y="46" font-family="sans-serif" font-size="16" fill="#ffeef0">Head of Corporate IT — Corporate IT Division</text>
  </g>

  <!-- large chibi businessman -->
  <g id="man" transform="translate(420,160)">
    <ellipse cx="0" cy="140" rx="120" ry="20" fill="rgba(0,0,0,0.22)"/>
    <path d="M-120,20 Q-120,120 -40,150 Q40,180 120,150 Q120,120 120,20 Z" fill="url(#suitSh)"/>
    <path d="M-70,32 Q0,100 70,32 Q0,48 -70,32 Z" fill="#173d66" opacity="0.14"/>
    <g transform="translate(0,-72)">
      <path d="M-36,0 Q0,-74 36,0 Q30,54 -30,54 Q-36,52 -36,0 Z" fill="url(#skinSh)" stroke="#b77f53" stroke-width="1"/>
      <path d="M-36,-6 Q-8,-56 12,-44 Q40,-26 36,-8 Q28,6 12,10 Q-4,20 -36,6 Z" fill="#151a23"/>
      <!-- eyes -->
      <g transform="translate(-8,-2)"><ellipse rx="12" ry="15" fill="#071226"/><ellipse rx="6" ry="8" fill="#4bd6ff" transform="translate(-1,-3)"/><circle cx="-2.8" cy="-4.0" r="2.4" fill="#fff"/></g>
      <g transform="translate(12,-2)"><ellipse rx="12" ry="15" fill="#071226"/><ellipse rx="6" ry="8" fill="#4bd6ff" transform="translate(-1,-3)"/><circle cx="-2.8" cy="-4.0" r="2.4" fill="#fff"/></g>
      <path d="M-8,10 Q0,14 8,10" stroke="#b06a3a" stroke-width="1.6" fill="none"/>
    </g>

    <!-- left arm petting -->
    <g transform="translate(-110,20)">
      <path d="M0,0 Q18,10 46,8 L62,8 Q74,8 82,12 Q86,16 82,22 Q76,30 62,28 L46,28 Q28,32 12,22 Q2,14 0,8 Z" fill="#0f3550"/>
      <circle cx="86" cy="34" r="10" fill="url(#skinSh)" stroke="#b77f53" stroke-width="0.7"/>
      <animateTransform attributeName="transform" type="rotate" values="0 -20 14; -20 -20 14; 6 -20 14; 0 -20 14" dur="3s" repeatCount="indefinite"/>
    </g>

    <!-- right arm holding -->
    <g transform="translate(110,24)">
      <path d="M0,0 Q-12,12 -44,10 L-60,10 Q-72,10 -80,14 Q-82,18 -80,24 Q-74,34 -60,32 L-38,32 Q-18,34 0,24 Z" fill="#0f3550"/>
      <circle cx="-86" cy="34" r="10" fill="url(#skinSh)" stroke="#b77f53" stroke-width="0.7"/>
      <animateTransform attributeName="transform" type="rotate" values="0 18 8; 22 18 8; -6 18 8; 0 18 8" dur="3.6s" repeatCount="indefinite"/>
    </g>
  </g>

  <!-- many cats: cluster left, center, right - total 10 cats -->
  <!-- cluster left -->
  <g transform="translate(240,200)">
    <!-- cat 1: lap (animated hop) -->
    <g transform="translate(62,8)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate"
        values="0,0; 0,-36; 0,0; 0,-12; 0,0" dur="3.8s" repeatCount="indefinite" />
      <use href="#cat-tail" transform="translate(20,6)">
        <animateTransform attributeName="transform" type="rotate" values="0;18;-10;0" dur="0.9s" repeatCount="indefinite" additive="sum"/>
      </use>
    </g>

    <!-- cat 2: shoulder -->
    <g transform="translate(420,-90)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,6; 0,0" dur="2.4s" repeatCount="indefinite" begin="0.6s"/>
      <use href="#cat-tail" transform="translate(20,6)">
        <animateTransform attributeName="transform" type="rotate" values="0;12;-6;0" dur="1.0s" repeatCount="indefinite" additive="sum"/>
      </use>
    </g>
  </g>

  <!-- center band: 5 cats -->
  <g transform="translate(480,210)">
    <!-- cat A: rolling -->
    <g transform="translate(-60,18)">
      <use href="#cat-chibi" />
      <animateTransform attributeName="transform" type="translate" values="0,0; -18,-36; 14,-14; 0,0" dur="4.6s" repeatCount="indefinite" begin="0.1s"/>
      <use href="#cat-tail" transform="translate(20,6)">
        <animateTransform attributeName="transform" type="rotate" values="0;-22;10;0" dur="1.2s" repeatCount="indefinite" additive="sum"/>
      </use>
    </g>

    <!-- cat B: leaping -->
    <g transform="translate(80,6)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; -120,-84; -220,-40; 0,0" dur="5.2s" repeatCount="indefinite" begin="0.3s"/>
      <use href="#cat-tail" transform="translate(20,6)">
        <animateTransform attributeName="transform" type="rotate" values="0;36;-18;0" dur="1.0s" repeatCount="indefinite" additive="sum"/>
      </use>
    </g>

    <!-- cat C: sleeping -->
    <g transform="translate(200,30)">
      <use href="#cat-chibi" />
      <g transform="translate(0,0)"><animateTransform attributeName="transform" type="translate" values="0,0; 0,-4; 0,0" dur="3.2s" repeatCount="indefinite"/></g>
      <use href="#cat-tail" transform="translate(20,6)">
        <animateTransform attributeName="transform" type="rotate" values="0;8;-4;0" dur="1.6s" repeatCount="indefinite" additive="sum"/>
      </use>
    </g>

    <!-- cat D: tail-chase small -->
    <g transform="translate(-220,60)">
      <use href="#cat-chibi" />
      <animateTransform attributeName="transform" type="translate" values="0,0; 18,-12; -12,-6; 0,0" dur="3.2s" repeatCount="indefinite" begin="0.9s"/>
      <use href="#cat-tail" transform="translate(20,6)">
        <animateTransform attributeName="transform" type="rotate" values="0;28;-12;0" dur="1.0s" repeatCount="indefinite" additive="sum"/>
      </use>
    </g>

    <!-- cat E: kitten cluster (two tiny kittens) -->
    <g transform="translate(320,18)">
      <g transform="translate(-8,0) scale(0.7)">
        <use href="#cat-chibi"/>
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="2.4s" repeatCount="indefinite" begin="0.4s"/>
      </g>
      <g transform="translate(24,6) scale(0.7)">
        <use href="#cat-chibi"/>
        <animateTransform attributeName="transform" type="translate" values="0,0; 6,-10; 0,0" dur="2.7s" repeatCount="indefinite" begin="0.8s"/>
      </g>
    </g>
  </g>

  <!-- right band: 3 cats -->
  <g transform="translate(820,220)">
    <!-- cat 1: on head -->
    <g transform="translate(0,-140)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 0,6; 0,0" dur="2.2s" repeatCount="indefinite" begin="0.2s"/>
      <use href="#cat-tail" transform="translate(20,6)">
        <animateTransform attributeName="transform" type="rotate" values="0;10;-6;0" dur="1.0s" repeatCount="indefinite" additive="sum"/>
      </use>
    </g>

    <!-- cat 2: ball play -->
    <g transform="translate(48,26)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; 12,-20; -6,-10; 0,0" dur="3.4s" repeatCount="indefinite" begin="0.5s"/>
      <use href="#cat-tail" transform="translate(20,6)">
        <animateTransform attributeName="transform" type="rotate" values="0;20;-10;0" dur="1.0s" repeatCount="indefinite" additive="sum"/>
      </use>
    </g>

    <!-- cat 3: curious sniff -->
    <g transform="translate(140,40)">
      <use href="#cat-chibi"/>
      <animateTransform attributeName="transform" type="translate" values="0,0; -10,-8; 6,-6; 0,0" dur="3.6s" repeatCount="indefinite" begin="0.7s"/>
      <use href="#cat-tail" transform="translate(20,6)">
        <animateTransform attributeName="transform" type="rotate" values="0;12;-6;0" dur="1.1s" repeatCount="indefinite" additive="sum"/>
      </use>
    </g>
  </g>

  <!-- sakura petals + sparkles -->
  <g transform="translate(40,20)">
    <path d="M0,0 C4,6 12,10 20,8 C12,2 6,-2 0,0 Z" fill="#ffd9e6" opacity="0.85">
      <animateTransform attributeName="transform" type="translate" values="80,10; 300,90; 900,260" dur="9s" repeatCount="indefinite" />
      <animate attributeName="opacity" values="0.85;0.45;0" dur="9s" repeatCount="indefinite" />
    </path>
  </g>

  <!-- sparkles -->
  <g transform="translate(1060,36)">
    <use href="#spark" transform="scale(0.9)">
      <animateTransform attributeName="transform" type="scale" values="0.9;1.4;0.9" dur="2.6s" repeatCount="indefinite"/>
    </use>
  </g>

  <!-- footer caption -->
  <text x="72" y="320" font-family="sans-serif" font-size="13" fill="#ffeef0">
    Corporate IT Division — Nurturing internal foundations with the warmth of everyday moments.
  </text>
</svg>